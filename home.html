<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- font awsome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- daisyUi Tailwind CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- styleSheet -->
    <link rel="stylesheet" href="style.css">

    <title>GITHUB ISSUE TRACKER</title>

</head>

<body>

    <header>
        <div
            class="navbar flex flex-col md:flex-row justify-between items-center bg-base-100 w-full md:w-3/4 mx-auto shadow-sm p-4 gap-4">
            <div class="flex items-center gap-5 ml-5">
                <img class="w-[40px] h-[40px]" src="./assets/github-logo.png" alt="">
                <h1 class="text-2xl font-bold">All Issues</h1>
            </div>

            <div class="flex gap-2 mr-5">

                <label class="input flex-1 items-center gap-2 ">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input id="search-text" type="text" class="" placeholder="Search issues..." />
                </label>

                <div class="flex-1">
                    <button onclick="serachBtn()" id="search-btn" class="btn btn-primary"> Search</button>
                </div>

            </div>
        </div>
    </header>

    <main class="w-3/4 mx-auto ">

        <section>
            <div class="mt-16 shadow-sm p-5 rounded-lg border border-gray-100 
            flex flex-col md:flex-row gap-3 justify-start">
                <button onclick="btnAll()" id="btn-all"
                    class="btn btn-outline  btn-active btn-primary px-14 js-btn">All</button>
                <button onclick="btnOpen()" id="btn-open" class="btn btn-outline btn-primary px-12 js-btn">Open</button>
                <button onclick="btnClose()" id="btn-close"
                    class="btn btn-outline btn-primary px-11 js-btn">Close</button>
            </div>
        </section>

        <section>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center p-5 shadow-sm mt-5 gap-4">
                <div class="flex flex-1 gap-5">
                    <img src="./assets/Aperture.png" alt="">
                    <div>
                        <h3 class="text-xl font-bold "> <span id="issue-count"></span> Issues</h3>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex  gap-5">
                    <div class="flex gap-2 items-center">
                        <i class="fa-solid fa-circle text-green-600"></i>
                        <p>Open</p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <i class="fa-solid fa-circle text-purple-700"></i>
                        <p>Close</p>
                    </div>


                </div>
            </div>
        </section>


        <section id="github-container"
            class=" bg-gray-100  p-5 my-10  grid grid-cols-1 md:grid-cols-3 space-x-5 space-y-5 ">

        </section>

         <section id="searchText-container"
            class=" bg-gray-100  p-5 my-10  grid grid-cols-1  space-x-5 space-y-5 ">

        </section>

    </main>


    <section>

        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">

                <div id="detail-container" class="space-y-3">
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </section>


    <script src="./script/index.js"></script>
    <script src="./script/open.js"></script>
    <script src="./script/close.js"></script>
    <script src="./script/search.js"></script>

</body>

</html>
