<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- font awsome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- daisyUi Tailwind CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- styleSheet -->
    <link rel="stylesheet" href="style.css">

    <title>GITHUB ISSUE TRACKER</title>

</head>

<body class="min-h-[763px] max-w-[520px] mt-20 mx-auto shadow-xl ">

    <div class="logo  mx-auto pt-10 flex flex-col justify-center items-center ">
        <img src="./assets/github-logo.png" alt="">
        <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
    </div>

    <div class="form pt-10 ">
        <div class="card bg-base-100 w-full max-w-[520px] shrink-0 shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral text-sm font-bold">Username</label>
                    <input id="user-name" type="text" class="input rounded-xl bg-base-200 w-full"
                        placeholder="Enter Username" />
                    <p class="text-[#4A00FF] text-sm">Default: admin</p>
                    <br>
                    <label class="label text-neutral text-sm font-bold">Password</label>
                    <input id="input-password" type="password" class="input rounded-xl bg-base-200 w-full"
                        placeholder="Enter Password" />
                        <p class="text-[#4A00FF] text-sm"> Default: admin123</p>
                        <br>
                    <button id="login-btn" class="btn btn-neutral mt-4 rounded-xl bg-primary text-xl w-full">Sign in</button>
              
                    
                </fieldset>
            </div>
        </div>
    </div>

    <div class="divider">OR</div>
    <div class="text-center">
        <h4 class="py-5">Demo Credentials:</h4>
        <h3> <span class=" font-semibold">Username:</span> admin</h3>
        <h3> <span class="font-semibold">Password:</span> admin123</h3>
    </div>

    <script src="./script/login.js"></script>

</body>

</html>
